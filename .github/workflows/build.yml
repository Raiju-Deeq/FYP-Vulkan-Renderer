name: CMake Build

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build-linux:
    name: Ubuntu — Ninja — Release
    runs-on: ubuntu-latest

    env:
      VCPKG_BINARY_SOURCES: "clear;x-gha,readwrite"
      VCPKG_COMMIT: "a42af01b72c28a8e47d2309876e0ef3d64f2e55f"

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          submodules: recursive

      # Official LunarG apt method for Ubuntu 24.04 (noble) runners
      - name: Install Vulkan SDK and system dependencies
        run: |
          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list
          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            vulkan-sdk \
            libgl-dev \
            libx11-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            ninja-build
          # Confirm glslc is available
          glslc --version
          echo "VULKAN_SDK=/usr" >> $GITHUB_ENV

      # Enable GHA cache for vcpkg binaries
      - name: Export vcpkg cache env vars
        uses: actions/github-script@v7
        with:
          script: |
            core.exportVariable('ACTIONS_CACHE_URL', process.env.ACTIONS_CACHE_URL || '');
            core.exportVariable('ACTIONS_RUNTIME_TOKEN', process.env.ACTIONS_RUNTIME_TOKEN || '');

      # Bootstrap vcpkg and install all deps from vcpkg.json
      - name: Setup vcpkg
        uses: lukka/run-vcpkg@v11
        id: vcpkg
        with:
          vcpkgGitCommitId: ${{ env.VCPKG_COMMIT }}

      - name: Configure CMake
        run: |
          cmake -B build \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE=${{ steps.vcpkg.outputs.RUNVCPKG_VCPKG_ROOT_OUT }}/scripts/buildsystems/vcpkg.cmake \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DVULKAN_SDK=/usr \
            -DBUILD_DOCS=OFF

      - name: Build
        run: cmake --build build --parallel

      - name: Verify executable was produced
        run: |
          ls -lh build/
          test -f build/vulkan-renderer \
            && echo "✅ vulkan-renderer binary found" \
            || (echo "❌ Binary not found — check CMakeLists.txt target name" && ls build/ && exit 1)
