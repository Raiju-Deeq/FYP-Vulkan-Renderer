name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to build, for example v0.1.0"
        required: true
        type: string

permissions:
  contents: write

env:
  RELEASE_TAG: ${{ github.event_name == 'workflow_dispatch' && inputs.tag || github.ref_name }}

jobs:
  release:
    name: Build and Publish Windows Release
    runs-on: windows-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        shell: pwsh
        run: |
          $version = "${env:RELEASE_TAG}".TrimStart("v")
          if (-not (Select-String -Path CMakeLists.txt -Pattern "project\(vulkan-renderer VERSION $version" -Quiet)) {
            throw "CMakeLists.txt version does not match ${env:RELEASE_TAG}"
          }
          if (-not (Select-String -Path vcpkg.json -Pattern "`"version`": `"$version`"" -Quiet)) {
            throw "vcpkg.json version does not match ${env:RELEASE_TAG}"
          }
          if (-not (Select-String -Path CHANGELOG.md -Pattern "## v$version" -Quiet)) {
            throw "CHANGELOG.md does not contain notes for ${env:RELEASE_TAG}"
          }

      - name: Bootstrap vcpkg
        shell: pwsh
        run: |
          git clone https://github.com/microsoft/vcpkg.git "$env:USERPROFILE\vcpkg"
          & "$env:USERPROFILE\vcpkg\bootstrap-vcpkg.bat" -disableMetrics
          "VCPKG_ROOT=$env:USERPROFILE\vcpkg" | Out-File -FilePath $env:GITHUB_ENV -Append

      - name: Configure CMake
        shell: pwsh
        run: |
          cmake -B build\release `
            -G "Visual Studio 17 2022" `
            -A x64 `
            -DCMAKE_TOOLCHAIN_FILE="$env:VCPKG_ROOT\scripts\buildsystems\vcpkg.cmake" `
            -DBUILD_DOCS=OFF

      - name: Build Windows release
        shell: pwsh
        run: cmake --build build\release --config Release --parallel

      - name: Package Windows binary
        shell: pwsh
        run: |
          $packageRoot = "Raiju-Renderer-${env:RELEASE_TAG}-windows-x64"
          New-Item -ItemType Directory -Path $packageRoot | Out-Null
          Copy-Item "build\release\Release\vulkan-renderer.exe" $packageRoot
          Copy-Item "build\release\Release\*.dll" $packageRoot
          Copy-Item "build\release\Release\assets" $packageRoot -Recurse
          Copy-Item "build\release\Release\shaders" $packageRoot -Recurse
          Copy-Item "README.md" $packageRoot
          Copy-Item "LICENSE" $packageRoot
          Compress-Archive -Path $packageRoot -DestinationPath "$packageRoot.zip" -Force

      - name: Create source archive
        shell: pwsh
        run: |
          git archive `
            --format=zip `
            --prefix="FYP-Vulkan-Renderer-${env:RELEASE_TAG}/" `
            -o "FYP-Vulkan-Renderer-${env:RELEASE_TAG}-source.zip" `
            HEAD

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        shell: pwsh
        run: |
          $sourceZip = "FYP-Vulkan-Renderer-${env:RELEASE_TAG}-source.zip"
          $windowsZip = "Raiju-Renderer-${env:RELEASE_TAG}-windows-x64.zip"

          gh release view "${env:RELEASE_TAG}" *> $null
          if ($LASTEXITCODE -eq 0) {
            gh release upload "${env:RELEASE_TAG}" $sourceZip $windowsZip --clobber
          } else {
            gh release create "${env:RELEASE_TAG}" `
              $sourceZip `
              $windowsZip `
              --title "Raiju Renderer ${env:RELEASE_TAG}" `
              --notes-file CHANGELOG.md
          }

  release-linux:
    name: Build and Upload Linux Release
    runs-on: ubuntu-latest
    needs: release

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.RELEASE_TAG }}

      - name: Validate release tag
        shell: bash
        run: |
          set -euo pipefail
          version="${RELEASE_TAG#v}"

          grep -q "project(vulkan-renderer VERSION ${version}" CMakeLists.txt
          grep -q "\"version\": \"${version}\"" vcpkg.json
          grep -q "## v${version}" CHANGELOG.md

      - name: Install Vulkan SDK and system dependencies
        shell: bash
        run: |
          set -euo pipefail

          wget -qO- https://packages.lunarg.com/lunarg-signing-key-pub.asc \
            | sudo tee /etc/apt/trusted.gpg.d/lunarg.asc > /dev/null
          sudo wget -qO /etc/apt/sources.list.d/lunarg-vulkan-noble.list \
            https://packages.lunarg.com/vulkan/lunarg-vulkan-noble.list

          sudo apt-get update -q
          sudo apt-get install -y --no-install-recommends \
            vulkan-sdk \
            libgl-dev \
            libx11-dev \
            libxinerama-dev \
            libxcursor-dev \
            libxi-dev \
            libxrandr-dev \
            ninja-build

          glslc --version
          echo "VULKAN_SDK=/usr" >> "$GITHUB_ENV"

      - name: Bootstrap vcpkg
        shell: bash
        run: |
          set -euo pipefail
          git clone https://github.com/microsoft/vcpkg.git "$HOME/vcpkg"
          "$HOME/vcpkg/bootstrap-vcpkg.sh" -disableMetrics
          echo "VCPKG_ROOT=$HOME/vcpkg" >> "$GITHUB_ENV"

      - name: Configure CMake
        shell: bash
        run: |
          set -euo pipefail
          cmake -B build/release \
            -G Ninja \
            -DCMAKE_BUILD_TYPE=Release \
            -DCMAKE_TOOLCHAIN_FILE="$VCPKG_ROOT/scripts/buildsystems/vcpkg.cmake" \
            -DVCPKG_TARGET_TRIPLET=x64-linux \
            -DVULKAN_SDK=/usr \
            -DBUILD_DOCS=OFF

      - name: Build Linux release
        shell: bash
        run: cmake --build build/release --parallel

      - name: Package Linux binary
        shell: bash
        run: |
          set -euo pipefail
          package_root="Raiju-Renderer-${RELEASE_TAG}-linux-x64"

          mkdir -p "$package_root"
          cp "build/release/vulkan-renderer" "$package_root/"
          cp -r "build/release/assets" "$package_root/"
          cp -r "build/release/shaders" "$package_root/"
          cp "README.md" "$package_root/"
          cp "LICENSE" "$package_root/"

          tar -czf "${package_root}.tar.gz" "$package_root"

      - name: Upload Linux release asset
        env:
          GH_TOKEN: ${{ github.token }}
        shell: bash
        run: |
          set -euo pipefail
          linux_tar="Raiju-Renderer-${RELEASE_TAG}-linux-x64.tar.gz"
          gh release upload "$RELEASE_TAG" "$linux_tar" --clobber
