name: GitHub Release

on:
  push:
    tags:
      - "v*.*.*"

permissions:
  contents: write

jobs:
  release:
    name: Create GitHub Release
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate release tag
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          grep -q "project(vulkan-renderer VERSION ${VERSION}" CMakeLists.txt
          grep -q "\"version\": \"${VERSION}\"" vcpkg.json
          grep -q "## v${VERSION}" CHANGELOG.md

      - name: Create source archive
        run: |
          git archive \
            --format=zip \
            --prefix="FYP-Vulkan-Renderer-${GITHUB_REF_NAME}/" \
            -o "FYP-Vulkan-Renderer-${GITHUB_REF_NAME}-source.zip" \
            "${GITHUB_SHA}"

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          gh release create "${GITHUB_REF_NAME}" \
            "FYP-Vulkan-Renderer-${GITHUB_REF_NAME}-source.zip" \
            --title "Raiju Renderer ${GITHUB_REF_NAME}" \
            --notes-file CHANGELOG.md
